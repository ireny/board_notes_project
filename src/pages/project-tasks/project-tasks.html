<section class="page-project-tasks py-4">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
    <a href="/dashboard" data-link class="btn btn-sm btn-outline-secondary">&larr; Back to Dashboard</a>
    <a href="#" data-link class="btn btn-sm btn-outline-primary" id="project-tasks-users-link">Users</a>
  </div>

  <div class="alert alert-warning d-none" id="project-tasks-auth-alert" role="alert">
    You need to be logged in to view tasks.
    <a href="/login" data-link>Login</a>
  </div>

  <div id="project-tasks-content" class="d-none">
    <h1 class="h2 mb-1" id="project-tasks-title">Project Tasks</h1>
    <p class="text-secondary mb-3" id="project-tasks-description"></p>

    <div class="page-project-tasks__board-shell">
      <div class="page-project-tasks__board" id="project-tasks-board">
        <div class="text-secondary">Loading project tasks...</div>
      </div>
    </div>
  </div>
</section>

<!-- Task Form Modal -->
<div class="modal fade" id="taskFormModal" tabindex="-1" aria-labelledby="taskFormModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="taskFormModalLabel">New Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="task-form" novalidate>
        <div class="modal-body">
          <input type="hidden" id="task-form-task-id" value="">
          <input type="hidden" id="task-form-stage-id" value="">
          <div class="mb-3">
            <label for="task-form-title" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="task-form-title" placeholder="Task title" required maxlength="200">
            <div class="invalid-feedback">Title is required.</div>
          </div>
          <div class="mb-3">
            <label for="task-form-description" class="form-label fw-semibold">Description</label>
            <textarea class="form-control" id="task-form-description" rows="4" placeholder="Optional description…"></textarea>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="task-form-done">
            <label class="form-check-label" for="task-form-done">Mark as done</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="task-form-submit">Create Task</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Task Confirm Modal -->
<div class="modal fade" id="deleteTaskModal" tabindex="-1" aria-labelledby="deleteTaskModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteTaskModalLabel">Delete Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-1">Are you sure you want to delete this task?</p>
        <p class="fw-semibold" id="delete-task-title-display"></p>
        <input type="hidden" id="delete-task-id" value="">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="delete-task-confirm-btn">Delete</button>
      </div>
    </div>
  </div>
</div>
