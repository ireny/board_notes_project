<section class="page-projects py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 mb-0">Projects</h1>
    <a href="/projects/new" data-link class="btn btn-primary">+ Create Project</a>
  </div>

  <div class="alert alert-warning d-none" id="projects-auth-alert" role="alert">
    You need to be logged in to view projects.
    <a href="/login" data-link>Login</a>
  </div>

  <div id="projects-content" class="d-none">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0" id="projects-table">
            <thead class="table-light">
              <tr>
                <th scope="col" class="ps-4">Title</th>
                <th scope="col">Description</th>
                <th scope="col" class="text-center">Stages</th>
                <th scope="col" class="text-center">Open Tasks</th>
                <th scope="col" class="text-center">Tasks Done</th>
                <th scope="col">Created</th>
                <th scope="col" class="text-end pe-4">Actions</th>
              </tr>
            </thead>
            <tbody id="projects-table-body">
              <tr>
                <td colspan="7" class="text-center py-4 text-secondary">Loading projects...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal fade" id="deleteProjectModal" tabindex="-1" aria-labelledby="deleteProjectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="deleteProjectModalLabel">Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="mb-2">Are you sure you want to delete <strong id="delete-project-name"></strong>?</p>
          <p class="text-danger mb-0"><small>This will also delete all associated tasks and cannot be undone.</small></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete Project</button>
        </div>
      </div>
    </div>
  </div>
</section>
